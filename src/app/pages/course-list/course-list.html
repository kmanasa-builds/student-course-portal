<div *ngIf="isLoading">
  <p>Loading courses...</p>
</div>

<p>Total Courses: {{ courses.length }}</p>

<hr>

<div *ngFor="let course of courses; trackBy: trackByCourseId">

  <app-course-card
    appHighlight="lightblue"
    [course]="course"
    (enrollRequested)="onEnroll($event)">
  </app-course-card>

  <hr>

</div>

<p *ngIf="selectedCourseId">

  Selected Course ID :
  {{ selectedCourseId }}

</p>
