<div *ngIf="isLoading">
  <p>Loading courses...</p>
</div>

<p>Total Courses: {{ courses.length }}</p>

<ng-template #noCourses>
  <p>No courses available.</p>
</ng-template>

<div *ngIf="!isLoading && courses.length > 0; else noCourses">

  <app-course-card
    appHighlight="lightblue"
    *ngFor="let course of courses; trackBy: trackByCourseId"
    [course]="course"
    (enrollRequested)="onEnroll($event)">
  </app-course-card>

</div>

<p *ngIf="selectedCourseId">
  Selected Course ID :
  {{ selectedCourseId }}
</p>
